{{- /*
Shared-token auth gate Secret (task 97). Rendered when an inline auth.token is given OR
auth.autoGenerate is on, and no pre-existing Secret is referenced. The deployment mounts this as
MEZZ_TOKEN_FILE. The value comes from mezza9.authToken (inline value, or an upgrade-stable
generated one). Prefer auth.existingSecret in production so the token is never committed to values.
*/}}
{{- if and (or .Values.auth.token .Values.auth.autoGenerate) (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mezza9.fullname" . }}-auth
  labels:
    {{- include "mezza9.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKey }}: {{ include "mezza9.authToken" . | quote }}
{{- end }}
