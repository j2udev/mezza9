{{- /* Auth config validation (task 97): fail the install early on misconfig rather than letting
       the pod come up unauthenticated or crash-loop opaquely. */ -}}
{{- if .Values.auth.token }}
{{- if not (trim .Values.auth.token) }}{{ fail "auth.token is set but blank - unset it to run without the gate, or give it a real value" }}{{ end }}
{{- end }}
{{- if include "mezza9.authEnabled" . }}
{{- if not (regexMatch "^[-._a-zA-Z0-9]+$" .Values.auth.secretKey) }}{{ fail "auth.secretKey must match [-._a-zA-Z0-9]+ (it is used as both a Secret key and a file path)" }}{{ end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mezza9.fullname" . }}
  labels:
    {{- include "mezza9.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mezza9.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mezza9.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "mezza9.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mezza9
          image: {{ include "mezza9.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.containerPort | quote }}
            {{- if .Values.demo.enabled }}
            - name: MEZZ_DEMO
              value: "1"
            {{- end }}
            {{- if include "mezza9.authEnabled" . }}
            # Built-in shared-token gate (task 97). The token is mounted from a Secret as a file
            # so it never appears in the pod's env / `kubectl describe`.
            - name: MEZZ_TOKEN_FILE
              value: /etc/mezza9/auth/{{ .Values.auth.secretKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if include "mezza9.authEnabled" . }}
          volumeMounts:
            - name: auth
              mountPath: /etc/mezza9/auth
              readOnly: true
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if include "mezza9.authEnabled" . }}
      volumes:
        - name: auth
          secret:
            secretName: {{ include "mezza9.authSecretName" . }}
      {{- end }}
